name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [labeled]

jobs:
  lint:
    if: github.event_name == 'push' || github.event.label.name == 'run-build'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Run lint
        run: ./gradlew lint

  release:
    needs: lint
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short=$(echo $GITHUB_SHA | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Decode signing keystore
        run: |
          echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > "${{ runner.temp }}/release.keystore"

      - name: Sign APK
        env:
          SIGNING_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          BUILD_TOOLS_DIR=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -n 1)
          "$BUILD_TOOLS_DIR/zipalign" -v -p 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            app-release-aligned.apk
          "$BUILD_TOOLS_DIR/apksigner" sign \
            --ks "$SIGNING_KEYSTORE_PATH" \
            --ks-pass "pass:$SIGNING_KEYSTORE_PASSWORD" \
            --ks-key-alias "$SIGNING_KEY_ALIAS" \
            --key-pass "pass:$SIGNING_KEY_PASSWORD" \
            --out "aTalkerApp-${{ steps.sha.outputs.short }}.apk" \
            app-release-aligned.apk

      - name: Publish pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: snapshot-${{ steps.sha.outputs.short }}
          name: Snapshot ${{ steps.sha.outputs.short }}
          draft: false
          prerelease: true
          generate_release_notes: true
          files: aTalkerApp-${{ steps.sha.outputs.short }}.apk
